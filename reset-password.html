<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>إعادة تعيين كلمة المرور | Advanced Pro Nano</title>
    <meta
      name="description"
      content="أدخل رمز التحقق وكلمة المرور الجديدة لإعادة تعيين كلمة المرور في منصة Advanced Pro Nano."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body data-page="reset-password" data-guest-only="true">
    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="/">
          <span class="brand-mark">AP</span>
          <span class="brand-copy">
            <strong>Advanced Pro Nano</strong>
            <span>Password Reset</span>
          </span>
        </a>

        <nav class="nav-links">
          <a href="/">الرئيسية</a>
          <a href="/pricing">الباقات</a>
          <a href="/how-it-works">كيف تعمل</a>
          <a href="/activate">التفعيل</a>
          <a href="/legal">القوانين</a>
          <a class="is-active" href="/reset-password">إعادة التعيين</a>
        </nav>

        <div class="header-actions">
          <a class="btn btn-secondary" href="/login">تسجيل الدخول</a>
        </div>
      </div>
    </header>

    <main>
      <section class="page-hero">
        <div class="container auth-grid auth-grid--narrow">
          <article class="page-card auth-card">
            <span class="section-kicker">Reset</span>
            <h1>إعادة تعيين كلمة المرور</h1>
            <p>أدخل رمز التحقق الذي وصلك بالبريد ثم حدّث كلمة المرور الجديدة.</p>

            <form id="resetPasswordForm" class="stack-form">
              <div class="field">
                <label for="resetEmail">البريد الإلكتروني</label>
                <input id="resetEmail" name="email" type="email" placeholder="name@example.com" required />
              </div>

              <div class="field">
                <label for="resetCode">رمز التحقق</label>
                <input id="resetCode" name="code" type="text" inputmode="numeric" placeholder="123456" required />
              </div>

              <div class="field">
                <label for="resetPassword">كلمة المرور الجديدة</label>
                <div class="password-input">
                  <input id="resetPassword" name="password" type="password" placeholder="********" required />
                  <button class="password-toggle" type="button" data-password-toggle></button>
                </div>
              </div>

              <div class="field">
                <label for="resetPasswordConfirm">تأكيد كلمة المرور</label>
                <div class="password-input">
                  <input
                    id="resetPasswordConfirm"
                    name="confirmPassword"
                    type="password"
                    placeholder="********"
                    required
                  />
                  <button class="password-toggle" type="button" data-password-toggle></button>
                </div>
              </div>

              <div class="status-message" hidden data-form-message></div>
              <button class="btn btn-primary btn-block" type="submit">تحديث كلمة المرور</button>
            </form>
          </article>
        </div>
      </section>
    </main>

    <script src="/site.js"></script>
    <script src="/portal.js"></script>
  </body>
</html>
