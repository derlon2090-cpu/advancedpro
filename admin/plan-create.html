<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>إنشاء باقة جديدة | Advanced Pro</title>
    <meta name="robots" content="noindex,nofollow" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css?v=20260602-admin-plans" />
  </head>
  <body class="admin-v2-page" data-page="admin-plan-create" data-requires-admin="true" data-skip-site-footer="true">
    <main class="admin-v2-shell">
      <aside class="admin-v2-sidebar" id="adminSidebar">
        <div class="admin-v2-brand">
          <img src="/ap-mark.svg" alt="" aria-hidden="true" />
          <div>
            <strong>Advanced Pro</strong>
            <span>لوحة تحكم الأدمن</span>
          </div>
        </div>

        <nav class="admin-v2-nav" aria-label="قائمة لوحة الأدمن">
          <a href="/admin/dashboard" data-icon="⌂">لوحة التحكم</a>
          <a href="/admin/keys" data-icon="⚿">المفاتيح</a>
          <a class="is-active" href="/admin/plans" data-icon="◈">الباقات</a>
          <a href="/admin/customers" data-icon="♙">العملاء</a>
          <a href="/admin/projects" data-icon="▣">المشاريع</a>
          <a href="/admin/reports" data-icon="▥">الإحصائيات</a>
          <a href="/admin/settings" data-icon="⚙">الإعدادات</a>
          <a href="/admin/activity" data-icon="◷">سجل النشاط</a>
          <a href="/admin/notifications" data-icon="♢">الإشعارات</a>
          <a href="/admin/backup" data-icon="◉">النسخ الاحتياطي</a>
        </nav>

        <button class="admin-v2-logout" type="button" data-logout>
          <span>↪</span>
          تسجيل الخروج
        </button>
      </aside>

      <section class="admin-v2-main">
        <header class="admin-v2-header">
          <button class="admin-v2-menu" type="button" data-admin-drawer-toggle aria-label="فتح القائمة">☰</button>
          <div class="admin-v2-profile" data-admin-profile>
            <span class="admin-v2-avatar">A</span>
            <div>
              <strong>مرحبًا</strong>
              <small>Owner</small>
            </div>
          </div>
          <div class="admin-v2-actions">
            <button type="button" aria-label="التنبيهات">🔔<b>8</b></button>
            <button type="button" aria-label="الوضع الليلي">◐</button>
            <button type="button" aria-label="اللغة">◉</button>
          </div>
          <nav class="admin-key-breadcrumb">
            <a href="/admin/plans">الباقات</a>
            <span>›</span>
            <strong>إنشاء باقة جديدة</strong>
          </nav>
        </header>

        <main class="admin-plans-page">
          <section class="admin-plans-hero">
            <div>
              <span class="admin-plans-icon">◈</span>
              <p>الباقات</p>
              <h1>إنشاء باقة جديدة</h1>
              <span>أدخل تفاصيل الباقة وشاهد المعاينة قبل الحفظ</span>
            </div>
          </section>

          <form id="adminPlanCreateForm" class="admin-plan-create-grid">
            <section class="admin-plan-form-card">
              <label>
                اسم الباقة
                <input name="name" type="text" placeholder="مثال: إبداع" required />
              </label>
              <label>
                وصف الباقة
                <textarea name="description" rows="3" placeholder="وصف مختصر يظهر في النظام"></textarea>
              </label>
              <div class="admin-plan-form-two">
                <label>
                  حد الصور
                  <input name="imagesLimit" type="number" min="0" value="25" required />
                </label>
                <label>
                  حد الفيديوهات
                  <input name="videosLimit" type="number" min="0" value="15" required />
                </label>
              </div>
              <div class="admin-plan-form-two">
                <label>
                  مدة الصلاحية بالأيام
                  <input name="validityDays" type="number" min="1" value="90" required />
                </label>
                <label>
                  السعر
                  <input name="price" type="number" min="0" step="0.01" value="149" required />
                </label>
              </div>
              <label>
                الحالة
                <select name="isActive">
                  <option value="true">نشطة</option>
                  <option value="false">معطلة</option>
                </select>
              </label>
              <p class="admin-secret-message" data-plan-create-message hidden></p>
              <div class="admin-key-create-actions">
                <a href="/admin/plans">إلغاء</a>
                <button type="submit">حفظ الباقة</button>
              </div>
            </section>

            <aside class="admin-plan-preview-wrap">
              <p>معاينة مباشرة</p>
              <article class="admin-plan-preview" data-plan-preview></article>
            </aside>
          </form>
        </main>
      </section>
    </main>

    <script src="/admin/plan-create-page.js?v=20260602-admin-plans"></script>
  </body>
</html>
