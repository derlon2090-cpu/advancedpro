<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>إنشاء أدمن جديد | Advanced Pro Nano</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body data-page="admin-create" data-requires-admin="true" data-skip-site-footer="true">
    <main class="admin-shell">
      <aside class="admin-sidebar">
        <a class="brand brand--column" href="/admin">
          <span class="brand-mark">AP</span>
          <span class="brand-copy">
            <strong>Advanced Pro Nano</strong>
            <span>Admin Panel</span>
          </span>
        </a>

        <nav class="admin-nav">
          <a href="/admin">الرئيسية</a>
          <a href="/admin/users">المستخدمون</a>
          <a class="is-active" href="/admin/create-admin">إنشاء أدمن</a>
          <a href="/admin/plans">الباقات</a>
          <a href="/admin/codes">الأكواد</a>
          <a href="/admin/available-codes">الأكواد المتاحة</a>
          <a href="/admin/activity">النشاط</a>
          <a href="/admin/reports">التقارير</a>
          <a href="/admin/settings">الإعدادات</a>
        </nav>

        <div class="admin-sidebar__footer">
          <a class="btn btn-secondary btn-block" href="/student.html">لوحة المستخدم</a>
          <button class="btn btn-primary btn-block" type="button" data-logout>تسجيل الخروج</button>
        </div>
      </aside>

      <section class="admin-main">
        <div class="admin-toolbar">
          <div>
            <span class="section-kicker">Admin</span>
            <h1>إنشاء حساب أدمن جديد</h1>
          </div>
        </div>

        <article class="page-card">
          <form id="adminCreateForm" class="split-form">
            <div class="field">
              <label>الاسم الكامل</label>
              <input name="fullName" type="text" placeholder="Admin" />
            </div>
            <div class="field">
              <label>البريد الإلكتروني</label>
              <input name="email" type="email" placeholder="admin@example.com" required />
            </div>

            <label class="toggle-field">
              <input name="autoPassword" type="checkbox" checked />
              <span>توليد كلمة مرور قوية تلقائيًا</span>
            </label>

            <div class="field password-field" hidden>
              <label>كلمة المرور</label>
              <div class="password-input">
                <input name="password" type="password" placeholder="********" minlength="8" />
                <button class="password-toggle" type="button" data-password-toggle></button>
              </div>
            </div>

            <div class="field password-field" hidden>
              <label>تأكيد كلمة المرور</label>
              <div class="password-input">
                <input
                  name="confirmPassword"
                  type="password"
                  placeholder="********"
                  minlength="8"
                />
                <button class="password-toggle" type="button" data-password-toggle></button>
              </div>
            </div>

            <div class="inline-actions">
              <button class="btn btn-primary" type="submit">إنشاء الأدمن</button>
              <button class="btn btn-secondary" type="button" data-admin-reset>تفريغ النموذج</button>
            </div>
          </form>

          <div class="status-message" hidden data-admin-create-message></div>
        </article>
      </section>
    </main>

    <script src="/site.js"></script>
    <script src="/portal.js"></script>
  </body>
</html>
