<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>العملاء | Advanced Pro</title>
    <meta name="robots" content="noindex,nofollow" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css?v=20260602-admin-customers-v2" />
  </head>
  <body class="admin-v2-page" data-page="admin-customers" data-requires-admin="true" data-skip-site-footer="true">
    <main class="admin-v2-shell">
      <aside class="admin-v2-sidebar" id="adminSidebar">
        <div class="admin-v2-brand">
          <img src="/ap-mark.svg" alt="" aria-hidden="true" />
          <div>
            <strong>Advanced Pro</strong>
            <span>لوحة تحكم الأدمن</span>
          </div>
        </div>

        <nav class="admin-v2-nav" aria-label="قائمة لوحة الأدمن">
          <a href="/admin/dashboard" data-icon="⌂">لوحة التحكم</a>
          <a href="/admin/keys" data-icon="⚿">المفاتيح</a>
          <a href="/admin/plans" data-icon="◈">الباقات</a>
          <a class="is-active" href="/admin/customers" data-icon="♙">العملاء</a>
          <a href="/admin/reports" data-icon="▥">الإحصائيات</a>
          <a href="/admin/settings" data-icon="⚙">الإعدادات</a>
          <a href="/admin/activity" data-icon="◷">سجل النشاط</a>
          <a href="/admin/backup" data-icon="◉">النسخ الاحتياطي</a>
        </nav>

        <button class="admin-v2-logout" type="button" data-logout>
          <span>↪</span>
          تسجيل الخروج
        </button>
      </aside>

      <section class="admin-v2-main">
        <header class="admin-v2-header">
          <button class="admin-v2-menu" type="button" data-admin-drawer-toggle aria-label="فتح القائمة">☰</button>
          <div class="admin-v2-profile" data-admin-profile>
            <span class="admin-v2-avatar">A</span>
            <div>
              <strong>مرحبًا</strong>
              <small>Owner</small>
            </div>
          </div>
          <div class="admin-v2-actions">
            <button type="button" aria-label="التنبيهات">🔔<b>8</b></button>
            <button type="button" aria-label="الوضع الليلي">◐</button>
            <button type="button" aria-label="اللغة">◉</button>
          </div>
          <label class="admin-v2-search">
            <span>⌕</span>
            <input type="search" placeholder="البحث في النظام..." aria-label="البحث في النظام" />
          </label>
        </header>

        <main class="admin-customers-page">
          <section class="admin-customers-hero">
            <div>
              <span class="admin-customers-icon">♙</span>
              <p>العملاء</p>
              <h1>العملاء</h1>
              <span>إدارة جميع العملاء المرتبطين بالمفاتيح والباقات</span>
            </div>
            <a class="admin-customers-create" href="/admin/key-new">＋ إضافة عميل</a>
          </section>

          <section class="admin-customers-stats" data-customer-stats>
            <article class="admin-v2-skeleton"></article>
            <article class="admin-v2-skeleton"></article>
            <article class="admin-v2-skeleton"></article>
            <article class="admin-v2-skeleton"></article>
          </section>

          <section class="admin-customers-panel">
            <div class="admin-customers-tools">
              <button type="button" data-export-customers>⇩ تصدير</button>
              <select data-customer-status>
                <option value="all">جميع الحالات</option>
                <option value="active">نشط</option>
                <option value="expired">منتهي</option>
                <option value="disabled">معطل</option>
              </select>
              <label class="admin-v2-search">
                <span>⌕</span>
                <input data-customer-search type="search" placeholder="ابحث عن عميل..." />
              </label>
            </div>
            <div data-admin-customers-table>
              <div class="admin-v2-empty">جارٍ تحميل العملاء...</div>
            </div>
          </section>
        </main>
      </section>
    </main>

    <div class="admin-customer-modal" data-customer-modal hidden>
      <section>
        <button type="button" data-close-customer-modal>×</button>
        <div data-customer-modal-content></div>
      </section>
    </div>

    <script src="/admin/customers-page.js?v=20260602-admin-customers-v2"></script>
  </body>
</html>
