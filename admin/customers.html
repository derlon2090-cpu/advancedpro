<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>العملاء | Advanced Pro</title>
    <meta name="robots" content="noindex,nofollow" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css?v=20260602-admin-customers" />
  </head>
  <body
    class="admin-v2-page"
    data-page="admin-customers"
    data-requires-admin="true"
    data-skip-site-footer="true"
  >
    <main class="admin-v2-shell">
      <aside class="admin-v2-sidebar" id="adminSidebar">
        <div class="admin-v2-brand">
          <img src="/ap-mark.svg" alt="" aria-hidden="true" />
          <div>
            <strong>Advanced Pro</strong>
            <span>لوحة تحكم الأدمن</span>
          </div>
        </div>

        <nav class="admin-v2-nav" aria-label="قائمة لوحة الأدمن">
          <a href="/admin/dashboard" data-icon="⌂">لوحة التحكم</a>
          <a href="/admin/keys" data-icon="⚿">المفاتيح</a>
          <a href="/admin/plans" data-icon="◈">الباقات</a>
          <a class="is-active" href="/admin/customers" data-icon="♙">العملاء</a>
          <a href="/admin/projects" data-icon="▣">المشاريع</a>
          <a href="/admin/reports" data-icon="▥">الإحصائيات</a>
          <a href="/admin/settings" data-icon="⚙">الإعدادات</a>
          <a href="/admin/activity" data-icon="◷">سجل النشاط</a>
          <a href="/admin/notifications" data-icon="♢">الإشعارات</a>
          <a href="/admin/backup" data-icon="◉">النسخ الاحتياطي</a>
        </nav>

        <button class="admin-v2-logout" type="button" data-logout>
          <span>↪</span>
          تسجيل الخروج
        </button>
      </aside>

      <section class="admin-v2-main">
        <header class="admin-v2-header">
          <button class="admin-v2-menu" type="button" data-admin-drawer-toggle aria-label="فتح القائمة">
            ☰
          </button>
          <div class="admin-v2-profile" data-admin-profile>
            <span class="admin-v2-avatar">A</span>
            <div>
              <strong>مرحبًا</strong>
              <small>Owner</small>
            </div>
          </div>
          <div class="admin-v2-actions">
            <button type="button" aria-label="التنبيهات">🔔<b>8</b></button>
            <button type="button" aria-label="الوضع الليلي">◐</button>
            <button type="button" aria-label="اللغة">◉</button>
          </div>
          <label class="admin-v2-search">
            <span>⌕</span>
            <input data-customer-search type="search" placeholder="ابحث عن عميل..." aria-label="ابحث عن عميل" />
          </label>
        </header>

        <main class="admin-keys-page">
          <section class="admin-keys-hero">
            <div>
              <span class="admin-keys-icon">♙</span>
              <p>العملاء</p>
              <h1>إدارة العملاء</h1>
              <span>قائمة العملاء المرتبطين بالمفاتيح والباقات</span>
            </div>
            <div class="admin-keys-actions">
              <a class="admin-keys-primary" href="/admin/key-new">＋ إنشاء مفتاح لعميل</a>
            </div>
          </section>

          <section class="admin-v2-card admin-keys-table-card">
            <div data-admin-customers-table>
              <div class="admin-v2-empty">جارٍ تحميل العملاء...</div>
            </div>
          </section>
        </main>
      </section>
    </main>

    <script src="/admin/customers-page.js?v=20260602-admin-customers"></script>
  </body>
</html>
