<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>إدارة المستخدمين | Advanced Pro Nano</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body data-page="admin-users" data-requires-admin="true" data-skip-site-footer="true">
    <main class="admin-shell">
      <aside class="admin-sidebar">
        <a class="brand brand--column" href="/admin">
          <span class="brand-mark">AP</span>
          <span class="brand-copy">
            <strong>Advanced Pro Nano</strong>
            <span>Admin Panel</span>
          </span>
        </a>

        <nav class="admin-nav">
          <a href="/admin">الرئيسية</a>
          <a class="is-active" href="/admin/users">المستخدمون</a>
          <a href="/admin/plans">الباقات</a>
          <a href="/admin/codes">الأكواد</a>
          <a href="/admin/activity">النشاط</a>
          <a href="/admin/reports">التقارير</a>
          <a href="/admin/settings">الإعدادات</a>
        </nav>

        <div class="admin-sidebar__footer">
          <a class="btn btn-secondary btn-block" href="/student.html">لوحة المستخدم</a>
          <button class="btn btn-primary btn-block" type="button" data-logout>تسجيل الخروج</button>
        </div>
      </aside>

      <section class="admin-main">
        <div class="admin-toolbar">
          <div>
            <span class="section-kicker">Users</span>
            <h1>إدارة المستخدمين</h1>
          </div>
        </div>

        <article class="page-card">
          <form id="adminUsersSearch" class="toolbar-form">
            <input name="search" type="search" placeholder="ابحث بالاسم أو الإيميل" />
            <button class="btn btn-secondary" type="submit">بحث</button>
          </form>
          <div class="status-message" hidden data-admin-users-message></div>
          <div data-admin-users></div>
        </article>
      </section>
    </main>

    <script src="/site.js"></script>
    <script src="/portal.js"></script>
  </body>
</html>
