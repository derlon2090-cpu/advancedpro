<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>الأكواد المتاحة | Advanced Pro Nano</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body
    data-page="admin-available-codes"
    data-requires-admin="true"
    data-skip-site-footer="true"
  >
    <main class="admin-shell">
      <aside class="admin-sidebar">
        <a class="brand brand--column" href="/admin">
          <span class="brand-mark">AP</span>
          <span class="brand-copy">
            <strong>Advanced Pro Nano</strong>
            <span>Admin Panel</span>
          </span>
        </a>

        <nav class="admin-nav">
          <a href="/admin">الرئيسية</a>
          <a href="/admin/users">المستخدمون</a>
          <a href="/admin/create-admin">إنشاء أدمن</a>
          <a href="/admin/plans">الباقات</a>
          <a href="/admin/codes">الأكواد</a>
          <a class="is-active" href="/admin/available-codes">الأكواد المتاحة</a>
          <a href="/admin/activity">النشاط</a>
          <a href="/admin/reports">التقارير</a>
          <a href="/admin/settings">الإعدادات</a>
        </nav>

        <div class="admin-sidebar__footer">
          <a class="btn btn-secondary btn-block" href="/student.html"
            >لوحة المستخدم</a
          >
          <button class="btn btn-primary btn-block" type="button" data-logout>
            تسجيل الخروج
          </button>
        </div>
      </aside>

      <section class="admin-main">
        <div class="admin-toolbar">
          <div>
            <span class="section-kicker">Codes</span>
            <h1>الأكواد المتاحة</h1>
            <p class="meta-line">
              تعرض هذه الصفحة الأكواد المتاحة للاستخدام مع إمكانية البحث
              والتصفية.
            </p>
          </div>
        </div>

        <article class="page-card">
          <form id="adminAvailableCodesSearch" class="toolbar-form">
            <input
              name="search"
              type="search"
              placeholder="ابحث بالكود"
            />
            <select name="status">
              <option value="available" selected>متاح</option>
              <option value="all">كل الحالات</option>
              <option value="used">تم الاستخدام</option>
              <option value="disabled">معطل</option>
            </select>
            <button class="btn btn-secondary" type="submit">بحث</button>
          </form>
          <div class="status-message" hidden data-admin-available-codes-message></div>
          <div data-admin-available-codes></div>
        </article>
      </section>
    </main>

    <script src="/site.js?v=20260414-2"></script>
    <script src="/portal.js?v=20260414-2"></script>
  </body>
</html>
