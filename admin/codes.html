<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>إدارة الأكواد | Advanced Pro Nano</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body data-page="admin-codes" data-requires-admin="true">
    <main class="admin-shell">
      <aside class="admin-sidebar">
        <a class="brand brand--column" href="/admin">
          <span class="brand-mark">AP</span>
          <span class="brand-copy">
            <strong>Advanced Pro Nano</strong>
            <span>Admin Panel</span>
          </span>
        </a>

        <nav class="admin-nav">
          <a href="/admin">الرئيسية</a>
          <a href="/admin/users">المستخدمون</a>
          <a class="is-active" href="/admin/codes">الأكواد</a>
          <a href="/admin/subscriptions">الاشتراكات</a>
          <a href="/admin/settings">الإعدادات</a>
        </nav>

        <div class="admin-sidebar__footer">
          <a class="btn btn-secondary btn-block" href="/dashboard">لوحة المستخدم</a>
          <button class="btn btn-primary btn-block" type="button" data-logout>تسجيل الخروج</button>
        </div>
      </aside>

      <section class="admin-main">
        <div class="admin-toolbar">
          <div>
            <span class="section-kicker">Codes</span>
            <h1>إنشاء وتعديل الأكواد</h1>
          </div>
        </div>

        <article class="page-card">
          <form id="adminCodeForm" class="split-form">
            <input name="id" type="hidden" />

            <div class="field">
              <label>الكود</label>
              <input name="code" type="text" placeholder="ADV-PRO-123" required />
            </div>
            <div class="field">
              <label>اسم الباقة</label>
              <input name="planName" type="text" placeholder="Pro 30" required />
            </div>
            <div class="field">
              <label>رصيد الصور</label>
              <input name="imageQuota" type="number" min="0" value="0" />
            </div>
            <div class="field">
              <label>رصيد المقاطع</label>
              <input name="videoQuota" type="number" min="0" value="0" />
            </div>
            <div class="field">
              <label>أقصى مدة للفيديو</label>
              <input name="videoMaxDurationSeconds" type="number" min="1" value="5" />
            </div>
            <div class="field">
              <label>مدة الصلاحية بالأيام</label>
              <input name="validityDays" type="number" min="1" value="30" />
            </div>
            <div class="field">
              <label>تجديد كل كم يوم</label>
              <input name="renewalEveryDays" type="number" min="1" placeholder="اختياري" />
            </div>
            <div class="field">
              <label>وضع التجديد</label>
              <select name="renewalMode">
                <option value="topup">topup</option>
                <option value="reset">reset</option>
              </select>
            </div>
            <div class="field">
              <label>تجديد الصور</label>
              <input name="renewalImageQuota" type="number" min="0" value="0" />
            </div>
            <div class="field">
              <label>تجديد المقاطع</label>
              <input name="renewalVideoQuota" type="number" min="0" value="0" />
            </div>
            <div class="field">
              <label>عدد مرات الاستخدام</label>
              <input name="maxRedemptions" type="number" min="1" value="1" />
            </div>
            <div class="field">
              <label>الإيميل المخصص</label>
              <input name="assignedEmail" type="email" placeholder="اختياري" />
            </div>

            <label class="toggle-field">
              <input name="renewalEnabled" type="checkbox" />
              <span>تفعيل التجديد الدوري</span>
            </label>
            <label class="toggle-field">
              <input name="isActive" type="checkbox" checked />
              <span>الكود نشط</span>
            </label>

            <div class="inline-actions">
              <button class="btn btn-primary" type="submit">حفظ الكود</button>
              <button class="btn btn-secondary" type="button" data-code-reset>تفريغ النموذج</button>
            </div>
          </form>

          <div class="status-message" hidden data-admin-codes-message></div>
        </article>

        <article class="page-card">
          <form id="adminCodesSearch" class="toolbar-form">
            <input name="search" type="search" placeholder="ابحث بالكود أو الإيميل أو اسم الباقة" />
            <button class="btn btn-secondary" type="submit">بحث</button>
          </form>
          <div data-admin-codes></div>
        </article>
      </section>
    </main>

    <script src="/portal.js"></script>
  </body>
</html>
