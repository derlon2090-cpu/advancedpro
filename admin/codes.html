<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>إدارة الأكواد | Advanced Pro Nano</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body data-page="admin-codes" data-requires-admin="true" data-skip-site-footer="true">
    <main class="admin-shell">
      <aside class="admin-sidebar">
        <a class="brand brand--column" href="/admin">
          <span class="brand-mark">AP</span>
          <span class="brand-copy">
            <strong>Advanced Pro Nano</strong>
            <span>Admin Panel</span>
          </span>
        </a>

        <nav class="admin-nav">
          <a href="/admin">الرئيسية</a>
          <a href="/admin/users">المستخدمون</a>
          <a href="/admin/create-admin">إنشاء أدمن</a>
          <a href="/admin/plans">الباقات</a>
          <a class="is-active" href="/admin/codes">الأكواد</a>
          <a href="/admin/available-codes">الأكواد المتاحة</a>
          <a href="/admin/activity">النشاط</a>
          <a href="/admin/reports">التقارير</a>
          <a href="/admin/settings">الإعدادات</a>
        </nav>

        <div class="admin-sidebar__footer">
          <a class="btn btn-secondary btn-block" href="/student.html">لوحة المستخدم</a>
          <button class="btn btn-primary btn-block" type="button" data-logout>تسجيل الخروج</button>
        </div>
      </aside>

      <section class="admin-main">
        <div class="admin-toolbar">
          <div>
            <span class="section-kicker">Codes</span>
            <h1>إنشاء وإدارة الأكواد</h1>
            <p class="meta-line">
              أنشئ كودًا كاملاً بحدود الصور والفيديو والتجديد والبريد المرتبط، ثم عدله أو عطله أو احذفه لاحقًا.
            </p>
          </div>
        </div>

        <article class="page-card">
          <form id="adminCodeForm" class="stack-form">
            <input name="id" type="hidden" />

            <div class="split-form">
              <div class="field">
                <label>الكود</label>
                <input name="code" type="text" placeholder="VIP-2026" required />
              </div>
              <div class="field">
                <label>اسم صاحب الكود</label>
                <input name="ownerName" type="text" placeholder="مثال: اشتراك متجر نانو" />
              </div>
              <div class="field">
                <label>عدد الصور</label>
                <input name="imageLimit" type="number" min="0" value="0" required />
              </div>
              <div class="field">
                <label>عدد الفيديوهات</label>
                <input name="videoLimit" type="number" min="0" value="0" required />
              </div>
              <div class="field">
                <label>نوع الاستخدام</label>
                <select name="accessType">
                  <option value="public" selected>عام</option>
                  <option value="private">مخصص لبريد واحد</option>
                </select>
              </div>
              <div class="field">
                <label>البريد الإلكتروني المرتبط</label>
                <input name="email" type="email" placeholder="user@example.com" />
              </div>
              <div class="field">
                <label>يتجدد؟</label>
                <select name="isRenewable">
                  <option value="false" selected>لا</option>
                  <option value="true">نعم</option>
                </select>
              </div>
              <div class="field">
                <label>نوع التجديد</label>
                <select name="renewalType">
                  <option value="">بدون تجديد</option>
                  <option value="daily">يومي</option>
                  <option value="weekly">أسبوعي</option>
                  <option value="monthly">شهري</option>
                </select>
              </div>
              <div class="field">
                <label>تاريخ انتهاء الكود</label>
                <input name="expiresAt" type="datetime-local" />
              </div>
              <div class="field">
                <label>حالة الكود</label>
                <select name="isActive">
                  <option value="true" selected>مفعل</option>
                  <option value="false">غير مفعل</option>
                </select>
              </div>
            </div>

            <div class="field">
              <label>ملاحظات داخلية</label>
              <textarea
                name="notes"
                rows="3"
                placeholder="هذه الملاحظات للأدمن فقط ولن تظهر للمستخدم"
              ></textarea>
            </div>

            <div class="inline-actions">
              <button class="btn btn-primary" type="submit">حفظ الكود</button>
              <button class="btn btn-secondary" type="button" data-code-reset>تفريغ النموذج</button>
            </div>
          </form>

          <div class="status-message" hidden data-admin-codes-message></div>
        </article>

        <article class="page-card">
          <form id="adminCodesSearch" class="toolbar-form">
            <input name="search" type="search" placeholder="ابحث بالكود أو البريد أو الاسم" />
            <select name="status">
              <option value="all" selected>كل الحالات</option>
              <option value="available">متاح</option>
              <option value="in-use">قيد الاستخدام</option>
              <option value="used">تم الاستخدام</option>
              <option value="expired">منتهي</option>
              <option value="inactive">غير مفعل</option>
            </select>
            <button class="btn btn-secondary" type="submit">بحث</button>
          </form>
          <div data-admin-codes></div>
        </article>
      </section>
    </main>

    <script src="/site.js?v=20260415-1"></script>
    <script src="/portal.js?v=20260415-1"></script>
    <script src="/admin/codes-page.js?v=20260415-1"></script>
  </body>
</html>
