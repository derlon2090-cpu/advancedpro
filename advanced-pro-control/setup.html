<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>إعداد أول أدمن | Advanced Pro</title>
    <meta name="robots" content="noindex,nofollow" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css?v=20260601-admin-secret" />
  </head>
  <body class="admin-secret-page">
    <main class="admin-secret-shell">
      <section class="admin-secret-card" aria-label="إعداد أول أدمن">
        <a class="key-brand admin-secret-brand" href="/" aria-label="Advanced Pro">
          <img class="key-brand__mark" src="/ap-mark.svg" alt="" aria-hidden="true" />
          <span class="key-brand__copy">
            <strong>Advanced Pro</strong>
            <span>إعداد أولي مخفي</span>
          </span>
        </a>

        <div class="admin-secret-heading">
          <h1>إنشاء أول أدمن</h1>
          <p>تعمل هذه الصفحة فقط إذا لم يكن هناك أي أدمن في قاعدة البيانات.</p>
        </div>

        <form id="adminSecretSetupForm" class="admin-secret-form">
          <label>
            الاسم
            <input name="name" type="text" autocomplete="name" required />
          </label>
          <label>
            البريد الإلكتروني
            <input name="email" type="email" autocomplete="username" required />
          </label>
          <label>
            كلمة المرور
            <input name="password" type="password" autocomplete="new-password" minlength="8" required />
          </label>
          <label>
            تأكيد كلمة المرور
            <input name="passwordConfirm" type="password" autocomplete="new-password" minlength="8" required />
          </label>
          <p class="admin-secret-message" data-admin-secret-message hidden></p>
          <button type="submit">إنشاء أول أدمن</button>
        </form>
      </section>
    </main>
    <script src="/admin-secret.js?v=20260601-admin-secret"></script>
  </body>
</html>
