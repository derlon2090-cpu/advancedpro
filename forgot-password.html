<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>نسيت كلمة المرور | Advanced Pro Nano</title>
    <meta
      name="description"
      content="أدخل بريدك الإلكتروني لبدء استعادة الوصول إلى حسابك في Advanced Pro Nano."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body data-page="forgot-password" data-guest-only="true">
    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="/">
          <span class="brand-mark">AP</span>
          <span class="brand-copy">
            <strong>Advanced Pro Nano</strong>
            <span>Password Recovery</span>
          </span>
        </a>

        <nav class="nav-links">
          <a href="/">الرئيسية</a>
          <a href="/pricing">الباقات</a>
          <a href="/how-it-works">كيف تعمل</a>
          <a href="/activate">التفعيل</a>
          <a class="is-active" href="/forgot-password">نسيت كلمة المرور</a>
        </nav>

        <div class="header-actions">
          <a class="btn btn-secondary" href="/login">تسجيل الدخول</a>
          <a class="btn btn-primary" href="/register">إنشاء حساب</a>
        </div>
      </div>
    </header>

    <main>
      <section class="page-hero">
        <div class="container auth-grid auth-grid--narrow">
          <article class="page-card auth-card">
            <span class="section-kicker">Recovery</span>
            <h1>استعادة الوصول إلى الحساب</h1>
            <p>أدخل بريدك الإلكتروني، وسيتابع النظام أو الدعم طلب استعادة الوصول إلى حسابك.</p>

            <form id="forgotPasswordForm" class="stack-form">
              <div class="field">
                <label for="forgotEmail">البريد الإلكتروني</label>
                <input id="forgotEmail" name="email" type="email" placeholder="name@example.com" required />
              </div>

              <div class="status-message" hidden data-form-message></div>
              <button class="btn btn-primary btn-block" type="submit">إرسال الطلب</button>
            </form>
          </article>
        </div>
      </section>
    </main>

    <script src="/site.js"></script>
    <script src="/portal.js"></script>
  </body>
</html>
