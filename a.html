<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Advanced Pro Nano | منصة ذكاء اصطناعي للأكواد والباقات</title>
    <meta
      name="description"
      content="نموذج واجهة احترافي لمنصة Advanced Pro Nano لتوليد الصور والمقاطع بالذكاء الاصطناعي مع نظام أكواد وباقات ولوحة إدارة متقدمة."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --blue: #2f80ff;
        --purple: #7b61ff;
        --pink: #e85aae;
        --ink: #111111;
        --soft-bg: #f8faff;
        --white: #ffffff;
        --muted: #63708b;
        --surface: rgba(255, 255, 255, 0.84);
        --hero-gradient: linear-gradient(135deg, #2f80ff 0%, #7b61ff 50%, #e85aae 100%);
        --soft-shadow: 0 28px 70px rgba(76, 103, 168, 0.18);
        --card-shadow: 0 16px 36px rgba(84, 109, 177, 0.12);
        --radius-xl: 32px;
        --radius-lg: 24px;
        --radius-md: 18px;
        --max-width: 1220px;
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "IBM Plex Sans Arabic", "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 15% 20%, rgba(47, 128, 255, 0.16), transparent 22%),
          radial-gradient(circle at 85% 15%, rgba(232, 90, 174, 0.16), transparent 20%),
          radial-gradient(circle at 75% 65%, rgba(123, 97, 255, 0.16), transparent 22%),
          linear-gradient(180deg, #ffffff 0%, #f9fbff 48%, #eef3ff 100%);
        overflow-x: hidden;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.45) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.45) 1px, transparent 1px);
        background-size: 56px 56px;
        mask-image: radial-gradient(circle at center, black 36%, transparent 92%);
        opacity: 0.45;
        pointer-events: none;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .container {
        width: min(calc(100% - 32px), var(--max-width));
        margin: 0 auto;
      }

      .site-header {
        position: sticky;
        top: 0;
        z-index: 20;
        backdrop-filter: blur(18px);
        background: rgba(248, 250, 255, 0.72);
        border-bottom: 1px solid rgba(255, 255, 255, 0.68);
      }

      .header-inner,
      .brand,
      .nav-links,
      .header-actions,
      .hero-actions,
      .tag-row,
      .plans-toggle,
      .cta-actions {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }

      .header-inner {
        justify-content: space-between;
        min-height: 88px;
        gap: 20px;
      }

      .brand-mark {
        position: relative;
        width: 56px;
        height: 56px;
        display: grid;
        place-items: center;
        border-radius: 18px;
        color: var(--white);
        background: var(--hero-gradient);
        box-shadow: 0 18px 34px rgba(123, 97, 255, 0.28);
        font-family: "Space Grotesk", sans-serif;
        font-weight: 700;
        letter-spacing: 0.08em;
      }

      .brand-mark::before {
        content: "";
        position: absolute;
        inset: 1px;
        border-radius: 17px;
        background:
          radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.42), transparent 40%),
          linear-gradient(145deg, rgba(255, 255, 255, 0.1), transparent 58%);
      }

      .brand-copy strong,
      .section-title h2,
      .hero h1,
      .highlight-card strong,
      .dashboard-card strong,
      .dashboard-wide strong,
      .price,
      .schema-card h3,
      .roadmap-item strong {
        font-family: "Space Grotesk", "IBM Plex Sans Arabic", sans-serif;
      }

      .brand-copy strong {
        display: block;
        font-size: 1.03rem;
      }

      .brand-copy span,
      .nav-links a,
      .section-title p,
      .card p,
      .card li,
      .spec-block p {
        color: var(--muted);
      }

      .nav-links a {
        position: relative;
        font-size: 0.98rem;
      }

      .nav-links a::after {
        content: "";
        position: absolute;
        right: 0;
        bottom: -8px;
        width: 100%;
        height: 2px;
        border-radius: 99px;
        background: var(--hero-gradient);
        transform: scaleX(0);
        transform-origin: right;
        transition: transform 0.24s ease;
      }

      .nav-links a:hover::after {
        transform: scaleX(1);
      }

      .btn,
      .toggle-btn {
        border: 0;
        border-radius: 999px;
        padding: 14px 22px;
        font: inherit;
        cursor: pointer;
        transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
      }

      .btn:hover,
      .toggle-btn:hover {
        transform: translateY(-2px);
      }

      .btn-primary,
      .toggle-btn.is-active {
        color: var(--white);
        background: var(--hero-gradient);
        box-shadow: 0 16px 28px rgba(123, 97, 255, 0.22);
      }

      .btn-secondary,
      .toggle-btn {
        color: #2b3b60;
        background: rgba(255, 255, 255, 0.76);
        box-shadow: inset 0 0 0 1px rgba(43, 59, 96, 0.08);
      }

      section {
        padding: 38px 0;
      }

      .hero {
        padding: 54px 0 34px;
      }

      .hero-grid,
      .demo-layout,
      .cta-grid {
        display: grid;
        grid-template-columns: minmax(0, 1.1fr) minmax(340px, 0.9fr);
        gap: 36px;
        align-items: center;
      }

      .eyebrow,
      .section-kicker,
      .tag,
      .pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        border-radius: 999px;
      }

      .eyebrow {
        padding: 10px 16px;
        color: #30426d;
        background: rgba(255, 255, 255, 0.72);
        box-shadow: inset 0 0 0 1px rgba(47, 128, 255, 0.14);
      }

      .eyebrow::before {
        content: "";
        width: 9px;
        height: 9px;
        border-radius: 999px;
        background: var(--hero-gradient);
        box-shadow: 0 0 14px rgba(123, 97, 255, 0.32);
      }

      h1,
      h2,
      h3 {
        margin: 0;
        line-height: 1.1;
      }

      .hero h1 {
        margin-top: 22px;
        max-width: 12ch;
        font-size: clamp(2.6rem, 5vw, 5.2rem);
        letter-spacing: -0.04em;
      }

      .hero h1 span {
        background: var(--hero-gradient);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }

      .hero p,
      .section-title p,
      .card p,
      .card li,
      .spec-block p,
      .cta-panel p {
        line-height: 1.85;
      }

      .hero p {
        max-width: 60ch;
        margin: 20px 0 0;
        font-size: 1.08rem;
        color: #42526f;
      }

      .hero-highlights,
      .dashboard-grid,
      .grid-3,
      .grid-2,
      .package-grid,
      .architecture-grid,
      .schema-grid,
      .roadmap {
        display: grid;
        gap: 18px;
      }

      .hero-highlights,
      .grid-3,
      .package-grid,
      .architecture-grid,
      .schema-grid,
      .roadmap {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .grid-2,
      .dashboard-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .highlight-card,
      .card,
      .package-card,
      .activation-card,
      .workspace-card,
      .spec-block,
      .schema-card,
      .roadmap-item,
      .journey-step {
        position: relative;
        padding: 24px;
        border-radius: var(--radius-lg);
        background: var(--surface);
        box-shadow: var(--card-shadow);
        border: 1px solid rgba(255, 255, 255, 0.84);
      }

      .highlight-card strong {
        display: block;
        margin-bottom: 8px;
        font-size: 1.4rem;
      }

      .highlight-card span {
        color: var(--muted);
        line-height: 1.7;
      }

      .hero-panel {
        position: relative;
        padding: 22px;
        border-radius: var(--radius-xl);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.9), rgba(255, 255, 255, 0.74)),
          var(--hero-gradient);
        box-shadow: var(--soft-shadow);
        border: 1px solid rgba(255, 255, 255, 0.78);
        overflow: hidden;
      }

      .hero-panel::before,
      .hero-panel::after {
        content: "";
        position: absolute;
        border-radius: 999px;
      }

      .hero-panel::before {
        width: 190px;
        height: 190px;
        left: -48px;
        top: -56px;
        background: rgba(47, 128, 255, 0.18);
      }

      .hero-panel::after {
        width: 240px;
        height: 240px;
        right: -62px;
        bottom: -80px;
        background: rgba(232, 90, 174, 0.16);
      }

      .mock-window {
        position: relative;
        border-radius: 28px;
        padding: 18px;
        background: rgba(250, 252, 255, 0.86);
        box-shadow: inset 0 0 0 1px rgba(108, 136, 212, 0.14);
      }

      .window-top,
      .quota-row,
      .feed-item,
      .package-list div,
      .workspace-top,
      .activity-item,
      .spec-list div {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .window-top {
        margin-bottom: 18px;
      }

      .window-dots {
        display: flex;
        gap: 8px;
      }

      .window-dots span {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: rgba(94, 112, 157, 0.3);
      }

      .window-badge,
      .section-kicker,
      .tag,
      .pill {
        padding: 8px 14px;
      }

      .window-badge,
      .section-kicker,
      .tag {
        color: #355082;
        background: rgba(47, 128, 255, 0.1);
      }

      .dashboard-card,
      .dashboard-wide,
      .dashboard-feed,
      .result-grid div,
      .activity-panel {
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.88);
        box-shadow: 0 14px 26px rgba(82, 112, 184, 0.1);
      }

      .dashboard-card,
      .dashboard-wide,
      .dashboard-feed,
      .activity-panel {
        padding: 16px;
      }

      .dashboard-card strong,
      .dashboard-wide strong {
        display: block;
        margin-top: 12px;
        font-size: 2rem;
      }

      .dashboard-wide,
      .dashboard-feed,
      .package-list,
      .activation-form,
      .spec-list {
        margin-top: 14px;
      }

      .dashboard-feed span,
      .dashboard-card span,
      .dashboard-wide span,
      .feed-item small,
      .field label,
      .activity-item small {
        color: var(--muted);
      }

      .quota-bar {
        flex: 1;
        height: 10px;
        border-radius: 999px;
        background: rgba(47, 128, 255, 0.1);
        overflow: hidden;
      }

      .quota-bar span {
        display: block;
        width: 72%;
        height: 100%;
        background: var(--hero-gradient);
      }
    </style>
  </head>
  <body>
