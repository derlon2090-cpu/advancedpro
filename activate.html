<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>تفعيل الكود | Advanced Pro Nano</title>
    <meta
      name="description"
      content="فعّل كود اشتراكك في Advanced Pro Nano عبر صفحة مستقلة وواضحة."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="index.html">
          <span class="brand-mark">AP</span>
          <span class="brand-copy">
            <strong>Advanced Pro Nano</strong>
            <span>Activation</span>
          </span>
        </a>

        <nav class="nav-links">
          <a href="index.html">الرئيسية</a>
          <a href="pricing.html">الباقات</a>
          <a href="how-it-works.html">كيف تعمل</a>
          <a class="is-active" href="activate.html">التفعيل</a>
          <a href="login.html">تسجيل الدخول</a>
        </nav>

        <div class="header-actions">
          <a class="btn btn-secondary" href="pricing.html">عرض الباقات</a>
          <a class="btn btn-primary" href="#activate-form">فعّل كودك</a>
        </div>
      </div>
    </header>

    <main>
      <section class="page-hero">
        <div class="container">
          <div class="section-title">
            <span class="section-kicker">التفعيل</span>
            <h2>فعّل اشتراكك الآن</h2>
            <p>أدخل الكود والبريد الإلكتروني لتفعيل رصيدك والبدء فورًا.</p>
          </div>

          <div class="activation-grid">
            <article class="activation-card" id="activate-form">
              <h3>بيانات التفعيل</h3>
              <form class="code-form">
                <div class="field">
                  <label for="activateCode">كود التفعيل</label>
                  <input id="activateCode" type="text" placeholder="ADV-NANO-15" />
                </div>

                <div class="field">
                  <label for="activateEmail">البريد الإلكتروني</label>
                  <input id="activateEmail" type="email" placeholder="name@advpro.ai" />
                </div>

                <button class="btn btn-primary" type="button">تفعيل الكود</button>
              </form>
            </article>

            <article class="form-card">
              <span class="section-kicker">مثال رصيد</span>
              <h3>بعد التفعيل</h3>
              <div class="mini-metrics">
                <div class="mini-metric">
                  <strong>10</strong>
                  <span>صور يومية</span>
                </div>
                <div class="mini-metric">
                  <strong>10</strong>
                  <span>مقاطع يومية</span>
                </div>
                <div class="mini-metric">
                  <strong>8s</strong>
                  <span>مدة المقطع</span>
                </div>
                <div class="mini-metric">
                  <strong>15</strong>
                  <span>يوم صلاحية</span>
                </div>
              </div>
            </article>
          </div>
        </div>
      </section>
    </main>

    <script src="site.js"></script>
  </body>
</html>
